apiVersion: v1
kind: Secret
metadata:
  name: grc-toolkit-secrets
  namespace: grc-toolkit
type: Opaque
data:
  # NEVER commit real values here
  # Inject via Google Secret Manager or CI/CD pipeline
  # To encode locally for testing only: echo -n "YOUR_KEY" | base64
  gemini-api-key: REPLACE_VIA_SECRET_MANAGER
