# Generic NGINX Ingress Controller (EKS, AKS, on-prem, etc.)
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: grc-toolkit.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    secretName: grc-toolkit-tls
