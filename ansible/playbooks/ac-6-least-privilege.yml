---
# Ansible Playbook: AC-6 Least Privilege (read-only audit profile)
# HITL: evidence collection only — scoped find paths, no service changes.
# Based on NIST 800-53 Rev. 5 Control AC-6

- name: "AC-6: Least Privilege Validation"
  hosts: all
  become: "{{ ansible_connection != 'local' and grc_audit_become | default(false) }}"
  vars:
    control_id: "AC-6"
    control_title: "Least Privilege"
    compliance_framework: "NIST 800-53 Rev. 5"
    grc_audit_mode: read_only

  tasks:
    - name: "AC-6.1: Verify user account privileges (read-only)"
      block:
        - name: "Check for NOPASSWD sudoers entries"
          command: grep -E '^[^#]*NOPASSWD' /etc/sudoers
          register: nopasswd_sudoers
          changed_when: false
          failed_when: false

        - name: "AC-6.1: WARN - NOPASSWD sudoers found"
          debug:
            msg: "NOPASSWD sudoers entries found - review for least privilege compliance"
          when: nopasswd_sudoers.rc == 0

        - name: "List UID 0 accounts"
          command: "awk -F: '$3==0 {print $1}' /etc/passwd"
          register: root_users
          changed_when: false

        - name: "AC-6.1: FAIL - Multiple root users found"
          fail:
            msg: "Multiple root users found - AC-6.1 compliance failure"
          when: root_users.stdout_lines | length > 1

    - name: "AC-6.2: Verify service account shell access (read-only)"
      block:
        - name: "List interactive service accounts"
          shell: "awk -F: '$3>=1000 && $7!=\"/bin/false\" && $7!=\"/usr/sbin/nologin\" {print $1}' /etc/passwd"
          register: service_accounts_with_shell
          changed_when: false

        - name: "AC-6.2: WARN - Service accounts with shell access"
          debug:
            msg: "Service accounts with shell access found - review for least privilege"
          when: service_accounts_with_shell.stdout | length > 0

    - name: "AC-6.3: Verify file permissions (scoped read-only find)"
      block:
        - name: "Check world-writable files in scoped paths"
          shell: |
            for d in {{ grc_audit_find_paths | join(' ') }}; do
              [ -d "$d" ] && find "$d" -xdev -type f -perm -002 2>/dev/null
            done | head -20
          register: world_writable_files
          changed_when: false
          failed_when: false

        - name: "AC-6.3: WARN - World-writable files found"
          debug:
            msg: "World-writable files found in scoped paths - review for security implications"
          when: world_writable_files.stdout | length > 0

        - name: "Check SUID/SGID files in scoped paths"
          shell: |
            for d in {{ grc_audit_find_paths | join(' ') }}; do
              [ -d "$d" ] && find "$d" -xdev -type f \( -perm -4000 -o -perm -2000 \) 2>/dev/null
            done | head -20
          register: suid_sgid_files
          changed_when: false
          failed_when: false

        - name: "AC-6.3: INFO - SUID/SGID files found"
          debug:
            msg: "SUID/SGID files found in scoped paths - verify necessity"
          when: suid_sgid_files.stdout | length > 0

    - name: "AC-6.4: Verify network service privileges (read-only)"
      block:
        - name: "List processes running as root"
          shell: ps aux | awk '$1=="root" && $11!~/\[.*\]/ {print $11}' | sort -u | head -30
          register: root_services
          changed_when: false

        - name: "AC-6.4: WARN - Services running as root"
          debug:
            msg: "Services running as root - consider privilege separation"
          when: root_services.stdout | length > 0

        - name: "Check legacy services are not active"
          command: "systemctl is-active {{ item }}"
          loop:
            - telnet
            - rsh
            - rlogin
            - ftp
          register: legacy_services
          changed_when: false
          failed_when: false
          when: ansible_service_mgr == 'systemd'

    - name: "Generate AC-6 compliance report"
      block:
        - name: "Ensure report directory exists"
          file:
            path: "{{ grc_compliance_report_dir }}"
            state: directory
            mode: "0755"

        - name: "Write AC-6 compliance report JSON"
          copy:
            content: |
              {
                "control_id": "AC-6",
                "hostname": "{{ inventory_hostname }}",
                "validation_timestamp": "{{ ansible_date_time.iso8601 }}",
                "grc_audit_mode": "{{ grc_audit_mode }}",
                "root_user_count": {{ root_users.stdout_lines | length }},
                "nopasswd_sudoers": {{ (nopasswd_sudoers.stdout_lines | default([])) | to_json }},
                "world_writable_sample": {{ (world_writable_files.stdout_lines | default([])) | to_json }},
                "suid_sgid_sample": {{ (suid_sgid_files.stdout_lines | default([])) | to_json }}
              }
            dest: "{{ grc_compliance_report_dir }}/ac-6-compliance-{{ ansible_date_time.epoch }}.json"
            mode: "0644"
