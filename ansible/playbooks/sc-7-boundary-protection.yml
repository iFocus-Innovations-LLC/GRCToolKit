---
# Ansible Playbook: SC-7 Boundary Protection (read-only audit profile)
# HITL: evidence collection only — no firewall state changes.
# Based on NIST 800-53 Rev. 5 Control SC-7

- name: "SC-7: Boundary Protection Validation"
  hosts: all
  become: "{{ ansible_connection != 'local' and grc_audit_become | default(false) }}"
  vars:
    control_id: "SC-7"
    control_title: "Boundary Protection"
    compliance_framework: "NIST 800-53 Rev. 5"
    grc_audit_mode: read_only

  tasks:
    - name: "SC-7.1: Verify firewall services (read-only)"
      block:
        - name: "Check iptables service status"
          command: systemctl is-active iptables
          register: iptables_active
          changed_when: false
          failed_when: false

        - name: "Check UFW service status"
          command: systemctl is-active ufw
          register: ufw_active
          changed_when: false
          failed_when: false

        - name: "SC-7.1: WARN - No active firewall service"
          debug:
            msg: "Neither iptables nor ufw appears active - review boundary protection"
          when: iptables_active.rc != 0 and ufw_active.rc != 0

    - name: "SC-7.2: Verify firewall rules (read-only)"
      block:
        - name: "List iptables chains"
          command: iptables -L
          register: iptables_list
          changed_when: false
          failed_when: false

        - name: "Check UFW status"
          command: ufw status
          register: ufw_status
          changed_when: false
          failed_when: false

    - name: "SC-7.3: Verify network interfaces (read-only)"
      block:
        - name: "List network interfaces"
          command: ip link show
          register: network_interfaces
          changed_when: false

        - name: "Check loopback is up"
          command: ip link show lo
          register: loopback_status
          changed_when: false
          failed_when: false

    - name: "SC-7.4: Verify network security config files (read-only)"
      block:
        - name: "Stat network configuration files"
          stat:
            path: "{{ item }}"
          loop:
            - "/etc/iptables/rules.v4"
            - "/etc/ufw/ufw.conf"
            - "/etc/sysctl.conf"
          register: network_config_files

    - name: "SC-7.5: Verify network monitoring tools (read-only)"
      block:
        - name: "Check tool availability"
          command: "which {{ item }}"
          loop:
            - tcpdump
            - ss
            - nmap
          register: network_tools
          changed_when: false
          failed_when: false

    - name: "Generate SC-7 compliance report"
      block:
        - name: "Ensure report directory exists"
          file:
            path: "{{ grc_compliance_report_dir }}"
            state: directory
            mode: "0755"

        - name: "Write SC-7 compliance report JSON"
          copy:
            content: |
              {
                "control_id": "SC-7",
                "hostname": "{{ inventory_hostname }}",
                "validation_timestamp": "{{ ansible_date_time.iso8601 }}",
                "grc_audit_mode": "{{ grc_audit_mode }}",
                "iptables_active": "{{ iptables_active.stdout | default('unknown') }}",
                "ufw_active": "{{ ufw_active.stdout | default('unknown') }}"
              }
            dest: "{{ grc_compliance_report_dir }}/sc-7-compliance-{{ ansible_date_time.epoch }}.json"
            mode: "0644"
