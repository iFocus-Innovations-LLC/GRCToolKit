---
# Ansible Playbook: AU-2 Audit Events (read-only audit profile)
# HITL: evidence collection only — no auditd state changes.
# Based on NIST 800-53 Rev. 5 Control AU-2

- name: "AU-2: Audit Events Validation"
  hosts: all
  become: "{{ ansible_connection != 'local' and grc_audit_become | default(false) }}"
  vars:
    control_id: "AU-2"
    control_title: "Audit Events"
    compliance_framework: "NIST 800-53 Rev. 5"
    grc_audit_mode: read_only

  tasks:
    - name: "AU-2.1: Verify auditd service (read-only)"
      block:
        - name: "Check auditd service is active"
          command: systemctl is-active auditd
          register: auditd_active
          changed_when: false
          failed_when: false

        - name: "AU-2.1: FAIL - Audit service not active"
          fail:
            msg: "Audit service not active - AU-2.1 compliance failure"
          when:
            - ansible_os_family != 'Darwin'
            - auditd_active.rc != 0

        - name: "AU-2.1: LAB NOTE - auditd not available on macOS"
          debug:
            msg: "Lab host (Darwin): auditd/systemctl checks skipped; run against production Linux for AU-2 evidence."
          when: ansible_os_family == 'Darwin'

    - name: "AU-2.2: Verify audit rules (read-only)"
      block:
        - name: "Check audit rules file"
          stat:
            path: "/etc/audit/rules.d/audit.rules"
          register: audit_rules_file

        - name: "Count non-comment audit rules"
          command: grep -c '^[^#]' /etc/audit/rules.d/audit.rules
          register: audit_rules_count
          changed_when: false
          failed_when: false
          when: audit_rules_file.stat.exists

        - name: "AU-2.2: FAIL - No audit rules configured"
          fail:
            msg: "No audit rules found - AU-2.2 compliance failure"
          when:
            - audit_rules_file.stat.exists
            - (audit_rules_count.stdout | default('0')) == '0'

        - name: "AU-2.2: WARN - Audit rules file missing"
          debug:
            msg: "Audit rules file not found - consider configuring audit rules"
          when: not audit_rules_file.stat.exists

    - name: "AU-2.3: Verify audit log files (read-only)"
      block:
        - name: "Check audit log directory"
          stat:
            path: "/var/log/audit"
          register: audit_log_dir

        - name: "Count audit log files"
          command: find /var/log/audit -maxdepth 1 -name 'audit.log*' -type f | wc -l
          register: audit_log_files
          changed_when: false
          failed_when: false
          when: ansible_os_family != 'Darwin'

        - name: "Set lab audit log placeholder (macOS)"
          set_fact:
            audit_log_files:
              stdout: "n/a"
          when: ansible_os_family == 'Darwin'

        - name: "AU-2.3: WARN - No audit log files found"
          debug:
            msg: "No audit log files found - audit logging may not be active"
          when:
            - ansible_os_family != 'Darwin'
            - (audit_log_files.stdout | default('0') | trim) == '0'

    - name: "AU-2.4: Verify audit log permissions (read-only)"
      block:
        - name: "Stat audit log file"
          stat:
            path: "/var/log/audit/audit.log"
          register: audit_log_perms
          failed_when: false

        - name: "Read audit log ownership"
          command: ls -la /var/log/audit/audit.log
          register: audit_log_ownership
          changed_when: false
          failed_when: false
          when: audit_log_perms.stat.exists | default(false)

    - name: "AU-2.5: Verify auditd configuration (read-only)"
      block:
        - name: "Check auditd.conf"
          stat:
            path: "/etc/audit/auditd.conf"
          register: auditd_config

        - name: "Count active auditd.conf settings"
          command: grep -cE '^[^#].*=' /etc/audit/auditd.conf
          register: auditd_config_lines
          changed_when: false
          failed_when: false
          when: auditd_config.stat.exists

    - name: "Generate AU-2 compliance report"
      block:
        - name: "Ensure report directory exists"
          file:
            path: "{{ grc_compliance_report_dir }}"
            state: directory
            mode: "0755"

        - name: "Write AU-2 compliance report JSON"
          copy:
            content: |
              {
                "control_id": "AU-2",
                "hostname": "{{ inventory_hostname }}",
                "validation_timestamp": "{{ ansible_date_time.iso8601 }}",
                "grc_audit_mode": "{{ grc_audit_mode }}",
                "auditd_active": "{{ auditd_active.stdout | default('unknown') }}",
                "audit_rules_count": "{{ audit_rules_count.stdout | default('0') }}",
                "audit_log_files": "{{ audit_log_files.stdout | default('0') | trim }}"
              }
            dest: "{{ grc_compliance_report_dir }}/au-2-compliance-{{ ansible_date_time.epoch }}.json"
            mode: "0644"
